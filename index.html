<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

.container{

position:relative;
z-index:2;
text-align:center;

}

.discord{

color:#3b82f6;
font-size:14px;
letter-spacing:2px;
margin-bottom:20px;

}

.label{

color:#888;
font-size:12px;
letter-spacing:3px;

}

.ip{

font-size:48px;
margin:15px 0;

}

button{

padding:12px 30px;
border:1px solid #7c3aed;
background:transparent;
color:#c084fc;
border-radius:6px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#7c3aed;
color:white;

}

/* MOBILE */

@media (max-width:600px){

.ip{
font-size:32px;
}

button{
width:70%;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="discord">DISCORD.GG/ZEEK</div>

<div class="label">SEU IPV4</div>

<div class="ip" id="ip">Carregando...</div>

<button onclick="copiarIP()">COPIAR</button>

</div>

<script>

let ipAtual="";

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

ipAtual=data.ip
document.getElementById("ip").innerText=data.ip

})

function copiarIP(){

navigator.clipboard.writeText(ipAtual)

}

particlesJS("particles-js",{

particles:{
number:{value:70},
color:{value:"#6d28d9"},
shape:{type:"circle"},
opacity:{value:0.3},
size:{value:3},
line_linked:{
enable:true,
distance:140,
color:"#6d28d9",
opacity:0.2,
width:1
},
move:{
enable:true,
speed:1.5
}
}

})

</script>

</body>
</html>
