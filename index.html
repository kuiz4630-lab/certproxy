<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial, sans-serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

.discord{
color:#3b82f6;
font-size:14px;
letter-spacing:2px;
margin-bottom:25px;
}

.label{
color:#888;
font-size:12px;
letter-spacing:3px;
}

.ip{
font-size:42px;
margin:15px 0;
}

button{
padding:12px 25px;
border:1px solid #7c3aed;
background:transparent;
color:#c084fc;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#7c3aed;
color:white;
}

.cert{
border-color:#22c55e;
color:#22c55e;
}

.cert:hover{
background:#22c55e;
color:black;
}

@media (max-width:600px){

.ip{
font-size:28px;
}

button{
width:90%;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="discord">DISCORD.GG/dashh</div>

<div class="label">SEU IPV4</div>

<div class="ip" id="ip">Carregando...</div>

<button onclick="copiarIP()">COPIAR IP</button>

<br>

<a href="certificado.pem" download>
<button class="cert">INSTALAR CERTIFICADO</button>
</a>

</div>

<script>

let ipAtual="";

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{
ipAtual=data.ip
document.getElementById("ip").innerText=data.ip
})
.catch(()=>{
document.getElementById("ip").innerText="Erro ao carregar IP"
})

function copiarIP(){

navigator.clipboard.writeText(ipAtual)
alert("IP copiado!")

}

particlesJS("particles-js",{
particles:{
number:{value:70},
color:{value:"#6d28d9"},
shape:{type:"circle"},
opacity:{value:0.3},
size:{value:3},
line_linked:{
enable:true,
distance:140,
color:"#6d28d9",
opacity:0.2,
width:1
},
move:{
enable:true,
speed:1.5
}
}
});

</script>

</body>
</html>
