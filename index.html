<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Proxy Installer</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

.panel{

position:relative;
z-index:2;

background:#0f172a;
padding:40px;
border-radius:12px;
width:340px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.8);

}

h1{
margin-bottom:25px;
}

button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.install{
background:#22c55e;
color:white;
}

.install:hover{
background:#16a34a;
}

.ip{
background:#3b82f6;
color:white;
}

.ip:hover{
background:#2563eb;
}

#resultado{
margin-top:20px;
font-size:18px;
color:#38bdf8;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="panel">

<h1>Proxy Installer</h1>

<a href="certificado.pem">
<button class="install">Instalar Certificado</button>
</a>

<button class="ip" onclick="verIP()">Mostrar meu IP</button>

<div id="resultado"></div>

</div>

<script>

function verIP(){

fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {

document.getElementById("resultado").innerHTML =
"Seu IP: " + data.ip

})

}

particlesJS("particles-js",{

particles:{
number:{value:80},
color:{value:"#ffffff"},
shape:{type:"circle"},
opacity:{value:0.5},
size:{value:3},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.2,
width:1
},
move:{
enable:true,
speed:2
}
}

});

</script>

</body>
</html>
